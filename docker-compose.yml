services:
  discord:
    build: .
    image: boneless-couch
    volumes:
      - ./.env:/app/.env:ro
    command: python -m couchd.platforms.discord.main
    restart: unless-stopped

  twitch:
    image: boneless-couch
    volumes:
      - ./.env:/app/.env:ro
      - ./.tio.tokens.json:/app/.tio.tokens.json
    command: python -m couchd.platforms.twitch.main
    ports:
      - "4343:4343"
    restart: unless-stopped

  youtube:
    image: boneless-couch
    volumes:
      - ./.env:/app/.env:ro
      - ./client_secret.json:/app/client_secret.json:ro
      - ./.youtube_chat.tokens.pkl:/app/.youtube_chat.tokens.pkl
    command: python -m couchd.platforms.youtube.main
    restart: unless-stopped
